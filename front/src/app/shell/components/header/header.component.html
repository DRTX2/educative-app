<nav class="topbar">
  <div class="brand-block">
    <div class="brand-mark">SR</div>
    <div class="brand-copy">
      <p class="eyebrow" translate>APP_NAME</p>
      <h1>{{ currentTitle }}</h1>
    </div>
  </div>

  <div class="topbar-actions">
    <div class="status-pill" [class.offline]="network.isOffline">
      <span class="status-dot"></span>
      <span>{{ network.isOnline ? 'Conectado' : 'Modo offline' }}</span>
    </div>
    <div class="user-pill">
      <span>{{ learnerName }}</span>
      <a routerLink="/logout">Cerrar sesión</a>
    </div>
    <app-language-selector></app-language-selector>
  </div>
</nav>

<!-- Popover menu -->
<ng-template #menu let-hide>
  <!-- This menu-content is generic class can be override with custom style as well, adjust width value directly as per need -->
  <div class="popper-menu-content" style="width: 150px">
    <ul>
      <li (click)="hide()">
        <label translate>Profile</label>
      </li>
      <li (click)="hide()" routerLink="/logout">
        <label translate>Logout</label>
      </li>
    </ul>
  </div>
</ng-template>
